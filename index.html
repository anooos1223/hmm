<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamDrop | Universal Downloader</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--primary); }
        p { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }

        .input-group { position: relative; }

        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover { background: #4f46e5; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #334155; cursor: not-allowed; }

        #result {
            margin-top: 1.5rem;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>StreamDrop</h1>
    <p>Download video from YouTube, TikTok, Twitter, etc.</p>
    
    <div class="input-group">
        <input type="url" id="urlInput" placeholder="Paste link here..." required>
        <button id="dlBtn" onclick="processDownload()">Download Video</button>
    </div>

    <div id="result"></div>
</div>

<script>
    async function processDownload() {
        const urlInput = document.getElementById('urlInput');
        const btn = document.getElementById('dlBtn');
        const resultDiv = document.getElementById('result');
        
        if (!urlInput.value) return;

        // Reset UI
        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> Fetching...';
        resultDiv.style.display = "block";
        resultDiv.style.color = "#94a3b8";
        resultDiv.innerText = "Connecting to API...";

        try {
            // Using Cobalt API (A popular open-source video downloader API)
            const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: {
                    "Cache-Control": "no-cache",
                    "Accept": "application/json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    url: urlInput.value,
                    vQuality: "720"
                })
            });

            const data = await response.json();

            if (data.status === "stream" || data.status === "redirect") {
                resultDiv.style.color = "#4ade80";
                resultDiv.innerText = "Success! Starting download...";
                window.location.href = data.url;
            } else {
                throw new Error(data.text || "Could not fetch video.");
            }

        } catch (error) {
            resultDiv.style.color = "#f87171";
            resultDiv.innerText = "Error: " + error.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "Download Video";
        }
    }
</script>

</body>
</html>
